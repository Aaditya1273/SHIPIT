[package]
name = "zk-pay-privacy-pool"
version = "2.0.0"
description = "ZK-PAY: Compliant Privacy Pool on Stellar — BLS12-381 Groth16 verification"
edition = "2021"
license = "Apache-2.0"
authors = ["Wonderland (ported to Stellar by ZK-Pay)"]

[lib]
crate-type = ["cdylib", "rlib"]

[features]
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "27.0.0-rc.1" }

[dev-dependencies]
soroban-sdk = { version = "27.0.0-rc.1", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
lto = true
debug = 0
codegen-units = 1
panic = "abort"
strip = "symbols"
debug-assertions = false

[profile.test]
opt-level = 0
overflow-checks = true

############################################################
# ZK-PAY: BUILD & DEPLOY
#
# Build:  cargo build --target wasm32-unknown-unknown --release
# Test:   cargo test
# Deploy: stellar contract deploy --wasm <WASM> --source <KEY> --network testnet -- --asset <ADDR> --verifier <ADDR> --owner <ADDR> --postman <ADDR>
#
# CRYPTO PRIMITIVES (Stellar Protocol 22+/CAP-0059):
#   env.crypto().bls12_381()   — BLS12-381 curve ops (G1/G2 add, mul, MSM, pairing)
#   env.crypto().sha256()      — SHA256 for scope/nonce hashing
#   TokenClient                — USDC transfers via Stellar Asset Contract
#
# Note: BN254 (CAP-0074) and Poseidon2 (CAP-0075) are NOT yet implemented on Stellar.
#       This contract uses BLS12-381 which IS available via CAP-0059.
############################################################
